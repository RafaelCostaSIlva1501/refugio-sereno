<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta
            name="description"
            content="Web site created using create-react-app"
        />

        <title>Refúgio Sereno</title>

        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        />

        <script src="https://cdn.tailwindcss.com"></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            white: {
                                50: "#ffffff1a",
                                100: "#ffffff27",
                                200: "#ffffff5e",
                                300: "#ffffff98",
                                400: "#ffffffcb",
                                500: "#ffffff",
                            },

                            black: {
                                50: "#0000001a",
                                100: "#00000027",
                                200: "#0000005e",
                                300: "#00000098",
                                400: "#000000cb",
                                500: "#000000",
                            },
                        },
                    },
                },
                plugins: [
                    function ({ addUtilities }) {
                        const newUtilities = {
                            ".centralize": {
                                position: "absolute",
                                left: "50%",
                                top: "50%",
                                transform: "translate(-50%, -50%)",
                                width: "100vw",
                                height: "100vh",
                            },
                            ".variant": {
                                fontVariant: "small-caps",
                                letterSpacing: "4px",
                            },
                            ".progressBar": {
                                "--progress-color": "blue",
                                "&::-webkit-progress-bar": {
                                    backgroundColor: "transparent",
                                    borderRadius: "5px",
                                },
                                "&::-webkit-progress-value": {
                                    backgroundColor: "var(--progress-color)",
                                    borderRadius: "5px",
                                    transition: "width 0.3s",
                                },
                            },
                            ".scrollbar": {
                                "&::-webkit-scrollbar": {
                                    width: "5px", // Largura da barra de rolagem
                                },
                                "&::-webkit-scrollbar-track": {
                                    background: "#ffffff28", // Cor do trilho
                                    borderRadius: "10px", // Borda arredondada
                                },
                                "&::-webkit-scrollbar-thumb": {
                                    background: "#ffffff49", // Cor do polegar
                                    borderRadius: "10px", // Borda arredondada
                                },
                                "&::-webkit-scrollbar-thumb:hover": {
                                    background: "#555", // Cor do polegar ao passar o mouse
                                },
                            },
                        };
                        addUtilities(newUtilities, ["responsive", "hover"]);
                    },
                ],
            };
        </script>

        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        />
    </head>
    <body class="scrollbar">
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

    --></body>
</html>
